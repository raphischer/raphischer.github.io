<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raphael Fischer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section id="hero" class="hero-panel">
      <nav class="page-nav">
        <a href="#cv">CV</a>
        <a href="#publications">Publications</a>
      </nav>
      <div class="hero-content">
        <h1 id="profile-name"></h1>
        <h2 id="profile-title"></h2>
        <div class="hero-main">
          <img id="profile-image" src="picture.jpg" alt="Profile picture">
          <div class="hero-text">
            <p id="summary"></p>
          </div>
        </div>
        <div class="buttons">
          <div class="button-group">
            <a id="download-cv" class="button" href="cv.pdf" target="_blank">Download CV</a>
            <a id="contact-link" class="button button-secondary" href="#" target="_blank">Contact</a>
          </div>
          <div class="contact-links">
            <a href="#" id="webpage-link" target="_blank">Webpage</a> · 
            <a href="#" id="linkedin-link" target="_blank">LinkedIn</a> · 
            <a href="#" id="scholar-link" target="_blank">Google Scholar</a> · 
            <a href="#" id="github-link" target="_blank">GitHub</a>
          </div>
        </div>
      </div>
    </section>

    <section id="cv" class="content-panel">
      <h2>Curriculum Vitae</h2>
      <div id="cv-sections"></div>
    </section>
    
    <section id="publications" class="content-panel">
      <h2>Publications</h2>
      <div id="publication-list" class="list-grid"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>© Copyright 2026 Raphael Fischer. Custom HTML and CSS. Hosted by GitHub Pages.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
